name: CLCE CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Unit Tests
  # Runs ALL test_*.py files discovered in prototype/tests/
  # Self-healing guarantees:
  #   ✓ pip cache (keyed on requirements.txt hash)
  #   ✓ conftest.py ensures sys.path is set — no ImportError
  #   ✓ fail-fast: false — 3.12 still runs if 3.10 fails
  #   ✓ coverage upload is non-fatal (if-no-files-found: ignore)
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prototype/requirements.txt

      - name: Run all tests
        working-directory: prototype
        run: |
          # Discovers ALL test_*.py under tests/ automatically
          pytest tests/ -v --tb=short \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: prototype/coverage.xml
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Benchmarks
  # advisory (continue-on-error: true — never blocks merges)
  # ═══════════════════════════════════════════════════════════════
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-bench-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-3.11-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prototype/requirements.txt

      - name: Run benchmarks
        run: python benchmarks/run_benchmarks.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Lint (ruff)
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check prototype/ benchmarks/ --ignore E501,E402
