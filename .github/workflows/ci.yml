name: CLCE CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Unit Tests
  # Uses python -m pytest so Python's own sys.path handling fires
  # before pytest rootdir detection. pytest.ini in prototype/ anchors
  # rootdir to prototype/ so conftest.py is always found first.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Tests · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prototype/requirements.txt

      - name: Run all tests
        run: |
          # python -m pytest ensures prototype/ is on sys.path automatically
          # PYTHONPATH is set explicitly as belt-and-suspenders
          PYTHONPATH="$GITHUB_WORKSPACE/prototype" \
            python -m pytest prototype/tests/ \
              -v --tb=short \
              --cov=prototype --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Benchmarks (advisory, never blocks merges)
  # ═══════════════════════════════════════════════════════════════
  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-bench-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-3.11-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prototype/requirements.txt

      - name: Run benchmarks
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/prototype" python benchmarks/run_benchmarks.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — Lint (ruff is now in requirements.txt)
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (includes ruff)
        run: |
          python -m pip install --upgrade pip
          pip install -r prototype/requirements.txt

      - name: Run ruff
        run: ruff check prototype/ benchmarks/ --ignore E501,E402
