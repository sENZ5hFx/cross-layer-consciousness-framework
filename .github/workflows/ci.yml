name: CLCE CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Unit Tests (matrix: 3.10 / 3.11 / 3.12)
  # Self-healing: pip cache, missing requirements guard,
  #               missing tests dir guard, coverage optional
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # don't cancel siblings on one version failure
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Guard: only install requirements.txt if it exists
          if [ -f prototype/requirements.txt ]; then
            pip install -r prototype/requirements.txt
          else
            echo "No requirements.txt found — skipping project deps"
          fi
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        working-directory: prototype
        # Guard: only run tests if the test file exists
        run: |
          if [ -f tests/test_subsystems.py ]; then
            pytest tests/test_subsystems.py -v --cov=. --cov-report=xml --cov-report=term-missing
          else
            echo "No test_subsystems.py found — skipping test run (non-fatal)"
          fi

      - name: Upload coverage report
        if: always()            # upload even if tests failed, for debugging
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: prototype/coverage.xml
          if-no-files-found: ignore   # non-fatal if coverage.xml wasn't produced

  # ─────────────────────────────────────────────
  # JOB 2: Benchmark Suite
  # Self-healing: guard for missing benchmark script/results dir
  # ─────────────────────────────────────────────
  benchmarks:
    name: Benchmark Suite
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true     # benchmarks are advisory; never block merges

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-bench-${{ hashFiles('prototype/requirements.txt') }}
          restore-keys: pip-3.11-bench-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f prototype/requirements.txt ]; then
            pip install -r prototype/requirements.txt
          fi

      - name: Run benchmarks
        run: |
          if [ -f benchmarks/run_benchmarks.py ]; then
            python benchmarks/run_benchmarks.py
          else
            echo "benchmarks/run_benchmarks.py not found — skipping (non-fatal)"
          fi

      - name: Ensure benchmark results dir exists
        run: mkdir -p benchmarks/results

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # JOB 3: Lint (ruff)
  # Self-healing: only lint if prototype/ or benchmarks/ exist
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          TARGETS=""
          [ -d prototype ] && TARGETS="$TARGETS prototype/"
          [ -d benchmarks ] && TARGETS="$TARGETS benchmarks/"
          if [ -n "$TARGETS" ]; then
            ruff check $TARGETS --ignore E501,E402
          else
            echo "No lintable directories found — skipping ruff (non-fatal)"
          fi
