name: IP Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — Copyright Header Check
  # Scans prototype/**/*.py, skips __init__.py and conftest.py
  # ═══════════════════════════════════════════════════════════════
  copyright-headers:
    name: Copyright Header Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check copyright headers
        run: |
          echo "Scanning Python files for copyright headers..."
          MISSING=0
          while IFS= read -r -d '' f; do
            if ! head -3 "$f" | grep -q 'Copyright.*Haley Ann Bird'; then
              echo "MISSING: $f"
              MISSING=$((MISSING+1))
            fi
          done < <(find prototype/ -name '*.py' \
            ! -name '__init__.py' \
            ! -name 'conftest.py' \
            -print0 2>/dev/null || true)
          if [ "$MISSING" -gt 0 ]; then
            echo "$MISSING file(s) missing copyright header."
            exit 1
          fi
          echo "All Python files have valid copyright headers."

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — Dependency License Scan
  # Blocks GPL/AGPL only — LGPL (numpy/scipy) is allowed
  # ═══════════════════════════════════════════════════════════════
  license-scan:
    name: Dependency License Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-licenses + project deps
        run: |
          pip install pip-licenses
          grep -v '^#' prototype/requirements.txt | pip install -r /dev/stdin || true

      - name: Scan licenses
        run: |
          pip-licenses --order=license --format=markdown
          if pip-licenses --order=license | grep -E '\b(GPL-[0-9]|GNU General Public License v[0-9]|AGPL)'; then
            echo "ERROR: Copyleft (GPL/AGPL) dependency detected."
            exit 1
          fi
          echo "License scan passed — no copyleft dependencies."

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — IP File Integrity
  # ═══════════════════════════════════════════════════════════════
  ip-file-integrity:
    name: IP File Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required IP files
        run: |
          REQUIRED=(
            LICENSE NOTICE IP_DECLARATION.md PRIOR_ART_REGISTRY.md
            PATENT_CLAIMS_SCAFFOLD.md COMMERCIAL_LICENSE.md
            CONTRIBUTING.md DCO.md SECURITY.md CODEOWNERS CHANGELOG.md
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING+1))
            fi
          done
          [ "$MISSING" -eq 0 ] && echo "All IP files present." || exit 1

  # ═══════════════════════════════════════════════════════════════
  # JOB 4 — Secret Scan (TruffleHog pinned)
  # ═══════════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scan base
        id: base
        run: |
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          else
            echo "base=4b825dc642cb6eb9a060e54bf8d69288fbee4904" >> "$GITHUB_OUTPUT"
          fi

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          base: ${{ steps.base.outputs.base }}
          head: HEAD
          extra_args: --only-verified
